spring:
  application:
    name: toxiproxy-poc

resilience4j:
  retry:
    instances:
      currency-api:
        max-attempts: 3
        wait-duration: 1s

  circuitbreaker:
    instances:
      currency-api:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s

  timelimiter:
    instances:
      currency-api:
        timeout-duration: 2s