spring:
  application:
    name: toxiproxy-poc

resilience4j:
  retry:
    instances:
      currency-api:
        max-attempts: 3
        wait-duration: 100ms

  circuitbreaker:
    instances:
      currency-api:
        sliding-window-size: 4
        minimum-number-of-calls: 4
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s

currency:
  api:
    url: https://cdn.jsdelivr.net